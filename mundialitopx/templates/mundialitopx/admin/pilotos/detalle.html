{% extends 'mundialitopx/base.html' %}
{% block content %}
<div class="row p-3">
        <div class="col-4 offset-4 pt-5">
            <div class="card text-center">
                <div class="card-body">
                    <div class="card-title">
                        <div class="row">
                            <div class="col-2"><img height="30px"  src="{{ piloto.escuderia.logo.url}}" alt=""></div>
                            <div class="col-2 offset-3"><h2>{{ piloto.puesto }}º</h2></div>
                            <div class="col-2 offset-3"><img height="30px"  src="{{ piloto.pais.bandera.url}}" alt=""></div>
                            <div class="col-12 "><img height="100px"  src="{{ piloto.foto.url}}" alt=""></div>
                            <div class="col-12"><h2>{{ piloto.nombre }} - {{ piloto.puntos }}pts</h2></div>
                            <div class="col-12"><p>{{ piloto.biografia }}</p></div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="row">
                            <div class="col-6"><a class="btn btn-primary" href="{% url 'editar_piloto' piloto.pk %}">Editar</a></div>
                            <div class="col-6"><a class="btn btn-danger" href="{% url 'borrar_piloto' piloto.pk %}">Borrar</a></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
</div>
{% endblock %}
