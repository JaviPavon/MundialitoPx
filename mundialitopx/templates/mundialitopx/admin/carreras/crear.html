{% extends 'mundialitopx/base.html' %}
{% load static %}
    {% block content %}
    <div class="container-fluid">
        <div class="row pt-5">
            <div class="col-6 offset-3">
                <div class="card p-3 shadow">
                    <div class="row ">
                        <div class="col-12 borber border-3 m-3">
                            <form action="" method="POST">
                                {% csrf_token %}
                                <div class="row justify-content-center">
                                    <div class="col-12 ">
                                        <div class="form-group">

                                                
                                            <label for="piloto" class="form-label">Piloto</label>
                                            <select name="piloto" id="piloto">
                                                <option value="todo">...........</option>
                                                {% for piloto in pilotos %}
                                                    <option value="{{ piloto.id }}">{{ piloto.nombre }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label for="codigo" class="form-label">Circuito</label>
                                            <select name="circuito" id="circuito">
                                                <option value="todo">...........</option>
                                                {% for circuito in circuitos %}
                                                    <option value="{{ circuito.id }}">{{ circuito.nombre }}</option>
                                                {% endfor %}
                                            </select>                                                
                                        </div>
                                        <div class="form-group">
                                            <label for="codigo" class="form-label">Puesto</label>
                                            <input type="number" name="puesto" id="puesto">                                              
                                        </div>

                                    </div>
                                    <div class="pt-3 col-12">
                                        <button class="btn btn-primary" type="submit">Crear Carrera</button>
                                    </div>
                                </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endblock %}
