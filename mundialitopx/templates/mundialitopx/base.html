{% load static %}
<head>
    <title>Mundialito PX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="text-center">
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="page-header">
                    <div class="row">
                        <div class="col-10">
                            <h1><a href="/">Administración</a></h1>
                        </div>
                        {% if user.is_authenticated %}
                        <div class="col-2"><a href="{% url 'logout' %}" class="top-menu"><i class="plus bi bi-door-closed">Cerrar Sesión</i></a>
                        </div>
                        {% else %}
                        <div class="col-2"><a href="{% url 'login' %}" class="top-menu"><i class="plus bi bi-fingerprint">Iniciar Sesión</i></a>
                        </div>
                        {% endif %}
                    </div>    

                </div>
            </div>
        </div>
    
        {% block content %}
        {% endblock %}
    
</div>
</body>
